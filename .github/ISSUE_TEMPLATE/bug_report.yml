name: Bug report
description: Report something that is not working correctly.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thank you for helping improve laraboxs.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps, commands, or UI actions.
      placeholder: |
        1. Run ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: laraboxs version
      placeholder: 0.1.0
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs or attach screenshots.
